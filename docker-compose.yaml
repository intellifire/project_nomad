services:
  # ===========================================
  # Nomad Services
  # ===========================================
  nomad-backend:
    container_name: nomad-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${NOMAD_BACKEND_HOST_PORT}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    env_file:
      - .env
    restart: unless-stopped

  nomad-frontend:
    container_name: nomad-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    ports:
      - "${NOMAD_FRONTEND_HOST_PORT}:80"
    depends_on:
      - nomad-backend
    restart: unless-stopped

  # ===========================================
  # FireSTARR Model Engine
  # ===========================================
  # NOTE: This service is NOT started with `docker compose up`.
  # It's a template used by `docker compose run firestarr-app <command>`.
  # The backend's DockerExecutor spawns ephemeral containers for each job.
  firestarr-app:
    image: ${FIRESTARR_IMAGE:-ghcr.io/cwfmf/firestarr:dev-${VERSION}}
    profiles: ["modeling"]  # Prevents auto-start with `docker compose up`
    volumes:
      - /etc/ssl/certs:/etc/ssl/certs
      - ${FIRESTARR_DATASET_PATH}:/appl/data
      - ${FIRESTARR_DATASET_PATH}/sims:/appl/data/sims
    env_file:
      - .env

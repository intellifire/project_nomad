<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff6b35" />
    <meta name="description" content="National fire modeling GUI for wildfire prediction and analysis" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nomad" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>Project Nomad - Fire Modeling</title>
    <style>
      /* Probability popup styling */
      .probability-popup .mapboxgl-popup-content {
        background: rgba(30, 30, 30, 0.95);
        color: #fff;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .probability-popup .mapboxgl-popup-tip {
        border-top-color: rgba(30, 30, 30, 0.95);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((registration) => {
              console.log('[App] SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('[App] SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>

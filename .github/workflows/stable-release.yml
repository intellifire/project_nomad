name: Stable Release

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  stable-release:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'dev'

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine bump level
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/determine-bump.sh
          BUMP=$(.github/scripts/determine-bump.sh "${{ github.event.pull_request.number }}")
          echo "level=${BUMP}" >> $GITHUB_OUTPUT
          echo "Bump level: $BUMP"

      - name: Apply version bump
        id: newversion
        run: |
          chmod +x .github/scripts/bump-version.sh
          NEW_VERSION=$(.github/scripts/bump-version.sh "${{ steps.bump.outputs.level }}")
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "New version: v${NEW_VERSION}"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json
          git commit -m "chore: bump to v${{ steps.newversion.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push

      - name: Create git tag
        run: |
          git tag "v${{ steps.newversion.outputs.version }}"
          git push origin "v${{ steps.newversion.outputs.version }}"

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build library and pack tarball
        run: npm run build:lib && npm pack
        working-directory: frontend

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.newversion.outputs.tag }}
          name: "v${{ steps.newversion.outputs.version }}"
          prerelease: false
          generate_release_notes: true
          files: frontend/nomad-frontend-*.tgz

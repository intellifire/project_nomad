name: Update CHANGES.md

on:
  push:
    branches: [main]
    paths-ignore:
      - 'CHANGES.md'

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CHANGES.md
        run: |
          chmod +x .github/scripts/generate-changes.sh
          .github/scripts/generate-changes.sh CHANGES.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGES.md
          if git diff --cached --quiet; then
            echo "No changes to CHANGES.md"
          else
            git commit -m "chore: auto-update CHANGES.md [skip ci]"
            git push
          fi

name: Build FireSTARR

on:
  workflow_dispatch:
    inputs:
      firestarr_ref:
        description: 'FireSTARR branch/tag to build'
        default: 'main'
        type: string
  release:
    types: [published]

jobs:
  build-linux:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Nomad (for workflow context)
        uses: actions/checkout@v4

      - name: Clone firestarr-cpp
        run: |
          git clone https://github.com/CWFMF/firestarr-cpp.git firestarr
          cd firestarr
          git checkout ${{ github.event.inputs.firestarr_ref || 'main' }}
          COMMIT=$(git rev-parse --short HEAD)
          echo "Building FireSTARR at $COMMIT"
          # CMakeLists.txt expects ../.env with VERSION
          echo "VERSION=dev-$COMMIT" > ../.env
          # Remove post-build copy that fails in CI
          sed -i '128,130d' CMakeLists.txt
          echo "Verifying removal:"
          grep -n "add_custom_command" CMakeLists.txt || echo "POST_BUILD removed successfully"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgeotiff-dev \
            libtiff-dev \
            libcurl4-openssl-dev

          # Use vcpkg for PROJ (Ubuntu's package lacks cmake config)
          export VCPKG_ROOT=/usr/local/share/vcpkg
          $VCPKG_ROOT/vcpkg install proj --triplet x64-linux

      - name: Configure CMake
        run: |
          export VCPKG_ROOT=/usr/local/share/vcpkg
          cmake -S firestarr -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS="-march=x86-64-v3" \
            -DCMAKE_PREFIX_PATH="$VCPKG_ROOT/installed/x64-linux" \
            -DCMAKE_RUNTIME_OUTPUT_DIRECTORY="$(pwd)/build/bin"

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Locate binary
        id: locate
        run: |
          # Find the built executable
          BINARY=$(find build -type f -name "firestarr" -executable | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: Could not find firestarr binary"
            find build -type f -executable
            exit 1
          fi
          echo "binary=$BINARY" >> $GITHUB_OUTPUT
          echo "Found binary at: $BINARY"

      - name: Check binary dependencies
        run: |
          echo "=== Binary info ==="
          file ${{ steps.locate.outputs.binary }}
          echo ""
          echo "=== Dynamic dependencies ==="
          ldd ${{ steps.locate.outputs.binary }} || true

      - name: Package artifact
        run: |
          mkdir -p dist
          cp ${{ steps.locate.outputs.binary }} dist/firestarr

          # Bundle data files if they exist
          [ -f firestarr/fuel.lut ] && cp firestarr/fuel.lut dist/
          [ -f firestarr/settings.ini ] && cp firestarr/settings.ini dist/
          [ -f firestarr/data/fuel.lut ] && cp firestarr/data/fuel.lut dist/
          [ -f firestarr/data/settings.ini ] && cp firestarr/data/settings.ini dist/

          # Create version info
          cd firestarr && git rev-parse HEAD > ../dist/VERSION && cd ..

          # List contents
          echo "=== Package contents ==="
          ls -la dist/

          # Create tarball
          tar -czvf firestarr-linux-${{ matrix.os }}.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firestarr-linux-${{ matrix.os }}
          path: firestarr-linux-${{ matrix.os }}.tar.gz
          retention-days: 30

  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout Nomad (for workflow context)
        uses: actions/checkout@v4

      - name: Clone firestarr-cpp
        run: |
          git clone https://github.com/CWFMF/firestarr-cpp.git firestarr
          cd firestarr
          git checkout ${{ github.event.inputs.firestarr_ref || 'main' }}
          COMMIT=$(git rev-parse --short HEAD)
          echo "Building FireSTARR at $COMMIT"
          # CMakeLists.txt expects ../.env with VERSION
          echo "VERSION=dev-$COMMIT" > ../.env
          # Remove post-build copy that fails in CI (BSD sed syntax)
          sed -i '' '128,130d' CMakeLists.txt
          echo "Verifying removal:"
          grep -n "add_custom_command" CMakeLists.txt || echo "POST_BUILD removed successfully"

          # Remove -mno-avx512f flag - ARM64 macOS doesn't have this x86_64-only option
          sed -i '' 's/-mno-avx512f//g' CMakeLists.txt
          echo "=== Removed AVX512 flag for ARM64 ==="

          # GCC on macOS requires TBB for std::execution parallel algorithms
          # Use find_library instead of find_package for better homebrew compatibility
          # Note: Use printf to avoid escaping issues with shell variables vs CMake variables
          printf '\n# TBB required for std::execution with GCC (patched by CI)\n' >> CMakeLists.txt
          printf 'if(APPLE AND CMAKE_CXX_COMPILER_ID STREQUAL "GNU")\n' >> CMakeLists.txt
          printf '  find_library(TBB_LIB tbb REQUIRED)\n' >> CMakeLists.txt
          printf '  target_link_libraries(${PROJECT_NAME} PRIVATE ${TBB_LIB})\n' >> CMakeLists.txt
          printf '  message(STATUS "Linked TBB: ${TBB_LIB}")\n' >> CMakeLists.txt
          printf 'endif()\n' >> CMakeLists.txt
          echo "=== TBB patch applied ==="
          echo "--- Tail of CMakeLists.txt ---"
          tail -10 CMakeLists.txt

          # Fix missing unistd.h for unlink() - GCC on macOS doesn't auto-include it
          sed -i '' '1s/^/#include <unistd.h>  \/\/ CI patch for unlink()\n/' src/cpp/ProbabilityMap.cpp
          echo "=== Added unistd.h to ProbabilityMap.cpp ==="

      - name: Install dependencies
        run: |
          brew install gcc proj libgeotiff libtiff curl tbb

      - name: Configure CMake
        run: |
          # Use GCC instead of Apple Clang (Clang lacks std::execution support)
          GCC_VERSION=$(brew list --versions gcc | grep -oE '[0-9]+' | head -1)
          export CC=$(brew --prefix)/bin/gcc-${GCC_VERSION}
          export CXX=$(brew --prefix)/bin/g++-${GCC_VERSION}
          echo "Using GCC: $CXX"

          # Set up Homebrew paths for libraries
          BREW_PREFIX=$(brew --prefix)
          TBB_ROOT=$(brew --prefix tbb)
          echo "Homebrew prefix: $BREW_PREFIX"
          echo "TBB location: $TBB_ROOT"

          cmake -S firestarr -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=$CC \
            -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_PREFIX_PATH="${BREW_PREFIX};${TBB_ROOT}" \
            -DCMAKE_EXE_LINKER_FLAGS="-L${BREW_PREFIX}/lib" \
            -DTBB_ROOT="${TBB_ROOT}" \
            -DCMAKE_RUNTIME_OUTPUT_DIRECTORY="$(pwd)/build/bin"

      - name: Build
        run: cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Locate binary
        id: locate
        run: |
          # Find the built executable
          BINARY=$(find build -type f -name "firestarr" -perm +111 | head -1)
          if [ -z "$BINARY" ]; then
            echo "ERROR: Could not find firestarr binary"
            find build -type f -perm +111
            exit 1
          fi
          echo "binary=$BINARY" >> $GITHUB_OUTPUT
          echo "Found binary at: $BINARY"

      - name: Check binary dependencies
        run: |
          echo "=== Binary info ==="
          file ${{ steps.locate.outputs.binary }}
          echo ""
          echo "=== Dynamic dependencies ==="
          otool -L ${{ steps.locate.outputs.binary }} || true

      - name: Package artifact
        run: |
          mkdir -p dist
          cp ${{ steps.locate.outputs.binary }} dist/firestarr

          # Bundle data files if they exist
          [ -f firestarr/fuel.lut ] && cp firestarr/fuel.lut dist/
          [ -f firestarr/settings.ini ] && cp firestarr/settings.ini dist/
          [ -f firestarr/data/fuel.lut ] && cp firestarr/data/fuel.lut dist/
          [ -f firestarr/data/settings.ini ] && cp firestarr/data/settings.ini dist/

          # Create version info
          cd firestarr && git rev-parse HEAD > ../dist/VERSION && cd ..

          # List contents
          echo "=== Package contents ==="
          ls -la dist/

          # Create tarball
          tar -czvf firestarr-macos-arm64.tar.gz -C dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firestarr-macos-arm64
          path: firestarr-macos-arm64.tar.gz
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Nomad (for workflow context)
        uses: actions/checkout@v4

      - name: Clone firestarr-cpp
        run: |
          git clone https://github.com/CWFMF/firestarr-cpp.git firestarr
          cd firestarr
          git checkout ${{ github.event.inputs.firestarr_ref || 'main' }}
          $COMMIT = git rev-parse --short HEAD
          echo "Building FireSTARR at $COMMIT"
          # CMakeLists.txt expects ../.env with VERSION
          "VERSION=dev-$COMMIT" | Out-File -FilePath ..\.env -Encoding utf8
          # Remove post-build copy that fails in CI (lines 128-130, 1-based = indexes 127-129)
          $lines = Get-Content CMakeLists.txt
          $filtered = for ($i = 0; $i -lt $lines.Count; $i++) { if ($i -lt 127 -or $i -gt 129) { $lines[$i] } }
          $filtered | Set-Content CMakeLists.txt
          echo "Verifying removal (should show no POST_BUILD):"
          Select-String -Path CMakeLists.txt -Pattern "POST_BUILD" || echo "POST_BUILD removed successfully"

          # Fix constexpr abs() issue for MSVC - replace abs(nd_) with inline ternary
          # MSVC doesn't consider std::abs() constexpr in all contexts
          $fireSpreadPath = "src/cpp/FireSpread.h"
          $content = Get-Content $fireSpreadPath -Raw
          $content = $content -replace 'const auto nd = abs\(nd_\);', 'const auto nd = (nd_ < 0) ? (-nd_) : nd_;'
          $content | Set-Content $fireSpreadPath -NoNewline
          echo "=== Patched FireSpread.h for MSVC constexpr compatibility ==="
        shell: pwsh

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Install dependencies
        run: |
          C:\vcpkg\vcpkg install proj libgeotiff tiff curl --triplet x64-windows
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -S firestarr -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_RUNTIME_OUTPUT_DIRECTORY="${{ github.workspace }}\build\bin"
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Locate binary
        id: locate
        run: |
          $BINARY = Get-ChildItem -Path build -Recurse -Filter "firestarr.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $BINARY) {
            echo "ERROR: Could not find firestarr.exe"
            Get-ChildItem -Path build -Recurse -Filter "*.exe" | Select-Object FullName
            exit 1
          }
          echo "binary=$BINARY" >> $env:GITHUB_OUTPUT
          echo "Found binary at: $BINARY"
        shell: pwsh

      - name: Check binary dependencies
        run: |
          echo "=== Binary info ==="
          Get-Item "${{ steps.locate.outputs.binary }}" | Format-List Name, Length, LastWriteTime
          echo ""
          echo "=== Binary size ==="
          (Get-Item "${{ steps.locate.outputs.binary }}").Length / 1MB | ForEach-Object { "{0:N2} MB" -f $_ }
        shell: pwsh

      - name: Package artifact
        run: |
          New-Item -ItemType Directory -Force -Path dist

          Copy-Item "${{ steps.locate.outputs.binary }}" dist\firestarr.exe

          # Copy required DLLs from vcpkg
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem "$vcpkgBin\*.dll" | Copy-Item -Destination dist\
          }

          # Bundle data files if they exist
          if (Test-Path firestarr\fuel.lut) { Copy-Item firestarr\fuel.lut dist\ }
          if (Test-Path firestarr\settings.ini) { Copy-Item firestarr\settings.ini dist\ }
          if (Test-Path firestarr\data\fuel.lut) { Copy-Item firestarr\data\fuel.lut dist\ }
          if (Test-Path firestarr\data\settings.ini) { Copy-Item firestarr\data\settings.ini dist\ }

          # Create version info
          cd firestarr
          git rev-parse HEAD | Out-File -FilePath ..\dist\VERSION -Encoding utf8
          cd ..

          # List contents
          echo "=== Package contents ==="
          Get-ChildItem dist

          # Create zip
          Compress-Archive -Path dist\* -DestinationPath firestarr-windows-x64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firestarr-windows-x64
          path: firestarr-windows-x64.zip
          retention-days: 30

  publish:
    needs: [build-linux, build-macos, build-windows]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List artifacts
        run: |
          echo "=== All artifacts ==="
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \)

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            firestarr-linux-ubuntu-22.04/firestarr-linux-ubuntu-22.04.tar.gz
            firestarr-linux-ubuntu-24.04/firestarr-linux-ubuntu-24.04.tar.gz
            firestarr-macos-arm64/firestarr-macos-arm64.tar.gz
            firestarr-windows-x64/firestarr-windows-x64.zip

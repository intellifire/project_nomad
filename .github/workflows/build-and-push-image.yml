name: Build and Push Nomad Image

# Triggers on Intellifire-specific tags. Tag scheme: vX.Y.Z-if.N where
# X.Y.Z mirrors upstream and N is our internal build counter on the
# intellifire branch (e.g., v0.5.0-if.1).
on:
  push:
    tags:
      - 'v*.*.*-if.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/intellifire/project_nomad

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      # Vite frontend bake-in args. Mapbox token is technically public (it ends
      # up in the JS bundle anyway) but managed via Actions secrets for change
      # control. NOMAD_AUTH_MODE defaults to simple — Intellifire usage runs
      # behind the EM3 backend proxy.
      # Backend-only image (Dockerfile.intellifire skips the Vite stage).
      # EM3 vendors Nomad's frontend tgz so the backend never serves it.
      # No VITE_* build args needed — backend/src/index.ts handles a missing
      # frontend/dist gracefully via existsSync().
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.intellifire
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"
